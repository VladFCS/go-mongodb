services:
  mongodb:
    image: mongo:7
    container_name: go-mongodb-demo
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: store
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh --quiet --eval \"try { rs.status().ok } catch (e) { rs.initiate({_id: 'rs0', members: [{ _id: 0, host: 'mongodb:27017' }] }).ok }\"",
        ]
      interval: 5s
      timeout: 30s
      retries: 10
    volumes:
      - mongodb_data:/data/db

volumes:
  mongodb_data:
